<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#ff6b35"><meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dishara">
<link rel="manifest" href="../manifest.json"><link rel="icon" type="image/svg+xml" href="../icons/icon.svg">
<title>Menu  Dishara</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/animations.css"><link rel="stylesheet" href="../css/responsive.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.menu-tabs-bar{display:flex;flex-wrap:wrap;gap:.5rem;padding:1.5rem 0}
.menu-tab{padding:.55rem 1.1rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:50px;color:var(--text-secondary);font-size:.83rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.menu-tab.active,.menu-tab:hover{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border-color:transparent}
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div class="cursor-glow" id="cursorGlow"></div>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <div class="logo-icon"><i class="fas fa-cloud"></i><i class="fas fa-utensils logo-utensils"></i></div>
      <span class="logo-text">Dish<span class="logo-highlight">ara</span></span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="../index.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
      <a href="restaurants.html" class="nav-link"><i class="fas fa-store"></i><span>Restaurants</span></a>
      <a href="menu.html" class="nav-link active"><i class="fas fa-book-open"></i><span>Menu</span></a>
      <a href="cart.html" class="nav-link cart-link"><i class="fas fa-shopping-cart"></i><span>Cart</span><span class="cart-badge" id="cartBadge">0</span></a>
      <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
      <a href="login.html" class="btn-nav-login" id="loginBtn"><i class="fas fa-user"></i><span>Login</span></a>
      <div class="user-menu hidden" id="userMenu">
        <div class="user-avatar" id="userAvatar"><span>U</span></div>
        <div class="user-dropdown" id="userDropdown">
          <div class="dropdown-header"><span id="userName">User</span><small id="userRole">Customer</small></div>
          <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
          <a href="orders.html"><i class="fas fa-receipt"></i> My Orders</a>
          <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<section class="page-hero">
  <div class="container">
    <h1 class="page-title animate-fade-up">Our <span class="gradient-text">Menu</span></h1>
    <p class="page-subtitle animate-fade-up delay-1">Explore delicious dishes from top restaurants</p>
  </div>
</section>
<section style="padding:0 0 5rem">
  <div class="container">
    <div class="menu-tabs-bar">
      <button class="menu-tab active" data-category="all"> All</button>
      <button class="menu-tab" data-category="starters"> Starters</button>
      <button class="menu-tab" data-category="mains"> Mains</button>
      <button class="menu-tab" data-category="rice"> Rice</button>
      <button class="menu-tab" data-category="pizza"> Pizza</button>
      <button class="menu-tab" data-category="burgers"> Burgers</button>
      <button class="menu-tab" data-category="sushi"> Sushi</button>
      <button class="menu-tab" data-category="desserts"> Desserts</button>
      <button class="menu-tab" data-category="drinks"> Drinks</button>
    </div>
    <div class="dish-grid" id="menuGrid">
      <!-- Injected by menu.js -->
    </div>
  </div>
</section>
<nav class="mobile-bottom-nav">
  <div class="nav-items">
    <a href="../index.html" class="nav-item"><span><i class="fas fa-home"></i></span><span>Home</span></a>
    <a href="restaurants.html" class="nav-item"><span><i class="fas fa-store"></i></span><span>Explore</span></a>
    <a href="menu.html" class="nav-item"><span><i class="fas fa-utensils"></i></span><span>Menu</span></a>
    <a href="cart.html" class="nav-item"><span><i class="fas fa-shopping-cart"></i></span><span>Cart</span></a>
    <a href="orders.html" class="nav-item"><span><i class="fas fa-receipt"></i></span><span>Orders</span></a>
  </div>
</nav>
<div class="toast-container" id="toastContainer"></div>
<script src="../js/data.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/app.js"></script>
<script src="../js/particles.js"></script>
<script src="../js/animations.js"></script>
<script src="../js/menu.js"></script>
<script>if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('../sw.js').catch(()=>{});});}</script>
</body>
</html>
