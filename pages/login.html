<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#ff6b35">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dishara">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/svg+xml" href="../icons/icon.svg">
    <link rel="apple-touch-icon" href="../icons/icon.svg">
    <title>Login — Dishara</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="cursor-glow" id="cursorGlow"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <div class="logo-icon"><i class="fas fa-cloud"></i><i class="fas fa-utensils logo-utensils"></i></div>
                <span class="logo-text">Cloud<span class="logo-highlight">Kitchen</span></span>
            </a>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-card glass-card animate-fade-up">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h2>Welcome <span class="gradient-text">Back</span></h2>
                    <p>Login to your Dishara account</p>
                </div>
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="password-input">
                            <input type="password" id="loginPassword" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe"> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-glow btn-block">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
                <div class="auth-divider">
                    <span>or continue with</span>
                </div>
                <div class="social-auth">
                    <button class="btn-social google"><i class="fab fa-google"></i> Google</button>
                    <button class="btn-social facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
                </div>
                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html" class="gradient-text">Sign Up</a></p>
                </div>

                <!-- Demo Credentials -->
                <div class="demo-credentials">
                    <h4>🚀 Quick Demo Login</h4>
                    <div class="demo-buttons">
                        <button class="btn btn-sm btn-outline demo-btn" data-email="customer@demo.com" data-password="demo123" data-role="customer">
                            <i class="fas fa-user"></i> Customer
                        </button>
                        <button class="btn btn-sm btn-outline demo-btn" data-email="owner@demo.com" data-password="demo123" data-role="owner">
                            <i class="fas fa-store"></i> Owner
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

        <!-- Mobile Bottom Navigation (PWA) -->
    <nav class="mobile-bottom-nav">
        <div class="nav-items">
            <a href="../index.html" class="nav-item">
                <span><i class="fas fa-home"></i></span>
                <span>Home</span>
            </a>
            <a href="restaurants.html" class="nav-item">
                <span><i class="fas fa-store"></i></span>
                <span>Explore</span>
            </a>
            <a href="menu.html" class="nav-item">
                <span><i class="fas fa-utensils"></i></span>
                <span>Menu</span>
            </a>
            <a href="cart.html" class="nav-item">
                <span><i class="fas fa-shopping-cart"></i></span>
                <span>Cart</span>
            </a>
            <a href="orders.html" class="nav-item">
                <span><i class="fas fa-receipt"></i></span>
                <span>Orders</span>
            </a>
        </div>
    </nav>
    <div class="toast-container" id="toastContainer"></div>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/particles.js"></script>
    <script src="../js/animations.js"></script>
    <script src="../js/auth.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('../sw.js')
            .then(reg => console.log('[Dishara] SW registered:', reg.scope))
            .catch(err => console.log('[Dishara] SW failed:', err));
        });
      }
    </script>
</body>
</html>
