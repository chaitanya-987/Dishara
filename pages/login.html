<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ff6b35">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dishara">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/svg+xml" href="../icons/icon.svg">
    <link rel="apple-touch-icon" href="../icons/icon.svg">
    <title>Login  Dishara</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6rem 1rem 4rem}
        .auth-container{width:100%;max-width:460px}
        .auth-card{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:2.5rem 2rem;box-shadow:0 25px 60px rgba(0,0,0,.4)}
        .auth-logo{text-align:center;margin-bottom:1.5rem}
        .auth-logo .logo-icon{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:18px;font-size:1.6rem;color:#fff;margin-bottom:.75rem;position:relative}
        .auth-logo .logo-icon .logo-utensils{position:absolute;font-size:.85rem;bottom:8px;right:8px}
        .auth-logo h2{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0}
        .auth-logo p{color:var(--text-secondary);font-size:.9rem;margin-top:.25rem}
        .auth-form .form-group{margin-bottom:1.25rem}
        .auth-form label{display:block;font-size:.85rem;font-weight:600;color:var(--text-secondary);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
        .input-wrapper{position:relative}
        .input-wrapper i.input-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:.9rem;pointer-events:none}
        .auth-form input[type=email],.auth-form input[type=password],.auth-form input[type=text]{width:100%;padding:.85rem 1rem .85rem 2.75rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:var(--text-primary);font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;box-sizing:border-box}
        .auth-form input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,53,.15)}
        .toggle-password{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:0;font-size:.9rem}
        .toggle-password:hover{color:var(--primary)}
        .btn-auth{width:100%;padding:1rem;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.03em;transition:opacity .2s,transform .2s;margin-top:.5rem}
        .btn-auth:hover{opacity:.9;transform:translateY(-1px)}
        .auth-divider{display:flex;align-items:center;gap:1rem;margin:1.25rem 0;color:var(--text-secondary);font-size:.8rem}
        .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
        .demo-buttons{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.5rem}
        .demo-btn{padding:.7rem .5rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:var(--text-primary);font-size:.8rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;text-align:center}
        .demo-btn:hover{background:rgba(255,107,53,.15);border-color:var(--primary);color:var(--primary)}
        .demo-btn i{margin-right:.4rem}
        .auth-footer{text-align:center;margin-top:1.5rem;color:var(--text-secondary);font-size:.88rem}
        .auth-footer a{color:var(--primary);font-weight:600;text-decoration:none}
        .auth-footer a:hover{text-decoration:underline}
        .form-options{display:flex;justify-content:flex-end;margin-bottom:1.25rem}
        .form-options a{color:var(--primary);font-size:.82rem;text-decoration:none;font-weight:500}
        .form-options a:hover{text-decoration:underline}
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="cursor-glow" id="cursorGlow"></div>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <div class="logo-icon"><i class="fas fa-cloud"></i><i class="fas fa-utensils logo-utensils"></i></div>
                <span class="logo-text">Dish<span class="logo-highlight">ara</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="../index.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
                <a href="restaurants.html" class="nav-link"><i class="fas fa-store"></i><span>Restaurants</span></a>
                <a href="menu.html" class="nav-link"><i class="fas fa-book-open"></i><span>Menu</span></a>
                <a href="cart.html" class="nav-link cart-link"><i class="fas fa-shopping-cart"></i><span>Cart</span><span class="cart-badge" id="cartBadge">0</span></a>
                <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                <a href="login.html" class="btn-nav-login" id="loginBtn"><i class="fas fa-user"></i><span>Login</span></a>
                <div class="user-menu hidden" id="userMenu">
                    <div class="user-avatar" id="userAvatar"><span>U</span></div>
                    <div class="user-dropdown" id="userDropdown">
                        <div class="dropdown-header"><span id="userName">User</span><small id="userRole">Customer</small></div>
                        <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                        <a href="orders.html"><i class="fas fa-receipt"></i> My Orders</a>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
                <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>
    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-card animate-fade-up">
                <div class="auth-logo">
                    <div class="logo-icon"><i class="fas fa-cloud"></i><i class="fas fa-utensils logo-utensils"></i></div>
                    <h2>Welcome Back</h2>
                    <p>Sign in to your Dishara account</p>
                </div>
                <div class="auth-divider">Quick Demo Login</div>
                <div class="demo-buttons">
                    <button class="demo-btn" data-email="customer@demo.com" data-password="demo123" data-role="customer">
                        <i class="fas fa-user"></i> Demo Customer
                    </button>
                    <button class="demo-btn" data-email="owner@demo.com" data-password="demo123" data-role="owner">
                        <i class="fas fa-store"></i> Demo Owner
                    </button>
                </div>
                <div class="auth-divider">Or sign in with email</div>
                <form id="loginForm" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-options"><a href="#">Forgot password?</a></div>
                    <button type="submit" class="btn-auth"><i class="fas fa-sign-in-alt"></i> &nbsp;Sign In</button>
                </form>
                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Create one free</a>
                </div>
            </div>
        </div>
    </section>
    <nav class="mobile-bottom-nav">
        <div class="nav-items">
            <a href="../index.html" class="nav-item"><span><i class="fas fa-home"></i></span><span>Home</span></a>
            <a href="restaurants.html" class="nav-item"><span><i class="fas fa-store"></i></span><span>Explore</span></a>
            <a href="menu.html" class="nav-item"><span><i class="fas fa-utensils"></i></span><span>Menu</span></a>
            <a href="cart.html" class="nav-item"><span><i class="fas fa-shopping-cart"></i></span><span>Cart</span></a>
            <a href="orders.html" class="nav-item"><span><i class="fas fa-receipt"></i></span><span>Orders</span></a>
        </div>
    </nav>
    <div class="toast-container" id="toastContainer"></div>
    <script src="../js/data.js"></script>
    <script src="../js/firebase.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/particles.js"></script>
    <script src="../js/animations.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
