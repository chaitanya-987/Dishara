<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Kitchenova</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="cursor-glow" id="cursorGlow"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <div class="logo-icon"><i class="fas fa-cloud"></i><i class="fas fa-utensils logo-utensils"></i></div>
                <span class="logo-text">Cloud<span class="logo-highlight">Kitchen</span></span>
            </a>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-card glass-card animate-fade-up" style="max-width: 520px;">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h2>Create <span class="gradient-text">Account</span></h2>
                    <p>Join Kitchenova today</p>
                </div>
                <form id="registerForm" class="auth-form">
                    <!-- Role Selection -->
                    <div class="role-selector">
                        <label class="role-option">
                            <input type="radio" name="role" value="customer" checked>
                            <div class="role-card">
                                <i class="fas fa-user"></i>
                                <span>Customer</span>
                                <small>Order food</small>
                            </div>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="owner">
                            <div class="role-card">
                                <i class="fas fa-store"></i>
                                <span>Restaurant Owner</span>
                                <small>List & sell</small>
                            </div>
                        </label>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Full Name</label>
                            <input type="text" id="regName" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Phone</label>
                            <input type="tel" id="regPhone" placeholder="+1 555-0000" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="regEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="password-input">
                            <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
                            <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                        </div>
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                            <span id="strengthText">Password strength</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Confirm Password</label>
                        <div class="password-input">
                            <input type="password" id="regConfirmPassword" placeholder="Confirm password" required>
                            <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="agreeTerms" required>
                            I agree to the <a href="#" class="gradient-text">Terms of Service</a> and <a href="#" class="gradient-text">Privacy Policy</a>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-glow btn-block">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
                <div class="auth-divider"><span>or continue with</span></div>
                <div class="social-auth">
                    <button class="btn-social google"><i class="fab fa-google"></i> Google</button>
                    <button class="btn-social facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
                </div>
                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html" class="gradient-text">Login</a></p>
                </div>
            </div>
        </div>
    </section>

    <div class="toast-container" id="toastContainer"></div>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/particles.js"></script>
    <script src="../js/animations.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
