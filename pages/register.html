<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ff6b35">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dishara">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/svg+xml" href="../icons/icon.svg">
    <link rel="apple-touch-icon" href="../icons/icon.svg">
    <title>Register  Dishara</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6rem 1rem 4rem}
        .auth-container{width:100%;max-width:500px}
        .auth-card{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:2.5rem 2rem;box-shadow:0 25px 60px rgba(0,0,0,.4)}
        .auth-logo{text-align:center;margin-bottom:1.5rem}
        .auth-logo .logo-icon{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:18px;font-size:1.6rem;color:#fff;margin-bottom:.75rem;position:relative}
        .auth-logo .logo-icon .logo-utensils{position:absolute;font-size:.85rem;bottom:8px;right:8px}
        .auth-logo h2{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0}
        .auth-logo p{color:var(--text-secondary);font-size:.9rem;margin-top:.25rem}
        .auth-form .form-group{margin-bottom:1.1rem}
        .auth-form label{display:block;font-size:.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.05em}
        .input-wrapper{position:relative}
        .input-wrapper i.input-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:.9rem;pointer-events:none}
        .auth-form input[type=email],.auth-form input[type=password],.auth-form input[type=text],.auth-form input[type=tel]{width:100%;padding:.8rem 1rem .8rem 2.75rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:var(--text-primary);font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;box-sizing:border-box}
        .auth-form input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,53,.15)}
        .toggle-password{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:0;font-size:.9rem}
        .toggle-password:hover{color:var(--primary)}
        .btn-auth{width:100%;padding:1rem;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.03em;transition:opacity .2s,transform .2s;margin-top:.5rem}
        .btn-auth:hover{opacity:.9;transform:translateY(-1px)}
        .auth-divider{display:flex;align-items:center;gap:1rem;margin:1rem 0;color:var(--text-secondary);font-size:.8rem}
        .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
        .auth-footer{text-align:center;margin-top:1.25rem;color:var(--text-secondary);font-size:.88rem}
        .auth-footer a{color:var(--primary);font-weight:600;text-decoration:none}
        .auth-footer a:hover{text-decoration:underline}
        .role-selector{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.1rem}
        .role-option{position:relative}
        .role-option input[type=radio]{position:absolute;opacity:0;width:0;height:0}
        .role-label{display:flex;flex-direction:column;align-items:center;gap:.35rem;padding:.85rem .5rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;cursor:pointer;transition:all .2s;font-size:.82rem;font-weight:600;color:var(--text-secondary)}
        .role-label i{font-size:1.4rem;color:var(--text-secondary);transition:color .2s}
        .role-option input:checked + .role-label{background:rgba(255,107,53,.12);border-color:var(--primary);color:var(--primary)}
        .role-option input:checked + .role-label i{color:var(--primary)}
        .strength-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:.5rem;overflow:hidden}
        .strength-fill{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s}
        .strength-label{display:flex;justify-content:flex-end;font-size:.75rem;margin-top:.25rem;color:var(--text-secondary)}
        #strengthText{font-weight:600}
        .agree-row{display:flex;align-items:flex-start;gap:.65rem;margin:1rem 0}
        .agree-row input[type=checkbox]{width:16px;height:16px;min-width:16px;accent-color:var(--primary);cursor:pointer;margin-top:2px}
        .agree-row label{font-size:.82rem;color:var(--text-secondary);cursor:pointer;text-transform:none;letter-spacing:0;font-weight:400}
        .agree-row label a{color:var(--primary);text-decoration:none;font-weight:600}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="cursor-glow" id="cursorGlow"></div>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <div class="logo-icon"><i class="fas fa-cloud"></i><i class="fas fa-utensils logo-utensils"></i></div>
                <span class="logo-text">Dish<span class="logo-highlight">ara</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="../index.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
                <a href="restaurants.html" class="nav-link"><i class="fas fa-store"></i><span>Restaurants</span></a>
                <a href="menu.html" class="nav-link"><i class="fas fa-book-open"></i><span>Menu</span></a>
                <a href="cart.html" class="nav-link cart-link"><i class="fas fa-shopping-cart"></i><span>Cart</span><span class="cart-badge" id="cartBadge">0</span></a>
                <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                <a href="login.html" class="btn-nav-login" id="loginBtn"><i class="fas fa-user"></i><span>Login</span></a>
                <div class="user-menu hidden" id="userMenu">
                    <div class="user-avatar" id="userAvatar"><span>U</span></div>
                    <div class="user-dropdown" id="userDropdown">
                        <div class="dropdown-header"><span id="userName">User</span><small id="userRole">Customer</small></div>
                        <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                        <a href="orders.html"><i class="fas fa-receipt"></i> My Orders</a>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
                <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>
    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-card animate-fade-up">
                <div class="auth-logo">
                    <div class="logo-icon"><i class="fas fa-cloud"></i><i class="fas fa-utensils logo-utensils"></i></div>
                    <h2>Create Account</h2>
                    <p>Join Dishara and start ordering or selling!</p>
                </div>
                <div class="auth-divider">I am a</div>
                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" name="role" id="roleCustomer" value="customer" checked>
                        <label class="role-label" for="roleCustomer">
                            <i class="fas fa-user"></i> Customer
                        </label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="role" id="roleOwner" value="owner">
                        <label class="role-label" for="roleOwner">
                            <i class="fas fa-store"></i> Restaurant Owner
                        </label>
                    </div>
                </div>
                <form id="registerForm" class="auth-form" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="regName">Full Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" id="regName" placeholder="Your name" autocomplete="name" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="regPhone">Phone</label>
                            <div class="input-wrapper">
                                <i class="fas fa-phone input-icon"></i>
                                <input type="tel" id="regPhone" placeholder="+1 555 0123" autocomplete="tel" required>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="regPassword" placeholder="Min 6 characters" autocomplete="new-password" required>
                            <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                        </div>
                        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                        <div class="strength-label">Strength: <span id="strengthText" style="margin-left:.3rem"></span></div>
                    </div>
                    <div class="form-group">
                        <label for="regConfirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="regConfirmPassword" placeholder="Repeat password" autocomplete="new-password" required>
                            <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="agree-row">
                        <input type="checkbox" id="agreeTerms">
                        <label for="agreeTerms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                    </div>
                    <button type="submit" class="btn-auth"><i class="fas fa-user-plus"></i> &nbsp;Create Account</button>
                </form>
                <div class="auth-footer">
                    Already have an account? <a href="login.html">Sign in</a>
                </div>
            </div>
        </div>
    </section>
    <nav class="mobile-bottom-nav">
        <div class="nav-items">
            <a href="../index.html" class="nav-item"><span><i class="fas fa-home"></i></span><span>Home</span></a>
            <a href="restaurants.html" class="nav-item"><span><i class="fas fa-store"></i></span><span>Explore</span></a>
            <a href="menu.html" class="nav-item"><span><i class="fas fa-utensils"></i></span><span>Menu</span></a>
            <a href="cart.html" class="nav-item"><span><i class="fas fa-shopping-cart"></i></span><span>Cart</span></a>
            <a href="orders.html" class="nav-item"><span><i class="fas fa-receipt"></i></span><span>Orders</span></a>
        </div>
    </nav>
    <div class="toast-container" id="toastContainer"></div>
    <script src="../js/data.js"></script>
    <script src="../js/firebase.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/particles.js"></script>
    <script src="../js/animations.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
