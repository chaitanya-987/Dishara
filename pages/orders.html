<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#ff6b35"><meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dishara">
<link rel="manifest" href="../manifest.json"><link rel="icon" type="image/svg+xml" href="../icons/icon.svg">
<title>My Orders  Dishara</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/animations.css"><link rel="stylesheet" href="../css/responsive.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.orders-wrapper{max-width:760px;margin:0 auto;padding:2rem 0 5rem}
.order-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:1.25rem 1.5rem;margin-bottom:1.1rem}
.order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;gap:.5rem;flex-wrap:wrap}
.order-id{font-size:.78rem;font-weight:600;color:var(--text-muted);font-family:monospace}
.order-date{font-size:.75rem;color:var(--text-muted);margin-left:.75rem}
.order-status{font-size:.75rem;font-weight:700;padding:.25rem .75rem;border-radius:20px;text-transform:capitalize;white-space:nowrap}
.order-status.pending{background:rgba(245,158,11,.15);color:#f59e0b}
.order-status.preparing{background:rgba(59,130,246,.15);color:#3b82f6}
.order-status.delivered{background:rgba(16,185,129,.15);color:#10b981}
.order-status.cancelled{background:rgba(239,68,68,.15);color:#ef4444}
.order-items-summary{font-size:.83rem;color:var(--text-secondary);margin:.4rem 0 .9rem;line-height:1.5}
.order-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.4rem}
.order-total{font-weight:700;color:var(--primary);font-size:.92rem}
.empty-orders-state{text-align:center;padding:4rem 1rem}
.empty-orders-state .eo-icon{font-size:4rem;margin-bottom:1rem}
.empty-orders-state h3{color:var(--text-primary);font-size:1.1rem;margin:0 0 .4rem}
.empty-orders-state p{color:var(--text-muted);font-size:.88rem;margin:0 0 1.5rem}
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div class="cursor-glow" id="cursorGlow"></div>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <div class="logo-icon"><i class="fas fa-cloud"></i><i class="fas fa-utensils logo-utensils"></i></div>
      <span class="logo-text">Dish<span class="logo-highlight">ara</span></span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="../index.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
      <a href="restaurants.html" class="nav-link"><i class="fas fa-store"></i><span>Restaurants</span></a>
      <a href="menu.html" class="nav-link"><i class="fas fa-book-open"></i><span>Menu</span></a>
      <a href="cart.html" class="nav-link cart-link"><i class="fas fa-shopping-cart"></i><span>Cart</span><span class="cart-badge" id="cartBadge">0</span></a>
      <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
      <a href="login.html" class="btn-nav-login" id="loginBtn"><i class="fas fa-user"></i><span>Login</span></a>
      <div class="user-menu hidden" id="userMenu">
        <div class="user-avatar" id="userAvatar"><span>U</span></div>
        <div class="user-dropdown" id="userDropdown">
          <div class="dropdown-header"><span id="userName">User</span><small id="userRole">Customer</small></div>
          <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
          <a href="orders.html"><i class="fas fa-receipt"></i> My Orders</a>
          <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<section class="page-hero">
  <div class="container">
    <h1 class="page-title animate-fade-up">My <span class="gradient-text">Orders</span></h1>
    <p class="page-subtitle animate-fade-up delay-1">Track and review your order history</p>
  </div>
</section>
<section>
  <div class="container">
    <div class="orders-wrapper">
      <div id="ordersListPage"></div>
      <div id="emptyOrders" class="empty-orders-state hidden">
        <div class="eo-icon"></div>
        <h3>No orders yet</h3>
        <p>Looks like you have not placed any orders yet. Browse our menu and place your first order!</p>
        <a href="menu.html" class="btn btn-primary" style="display:inline-flex"><i class="fas fa-utensils"></i> Browse Menu</a>
      </div>
    </div>
  </div>
</section>
<nav class="mobile-bottom-nav">
  <div class="nav-items">
    <a href="../index.html" class="nav-item"><span><i class="fas fa-home"></i></span><span>Home</span></a>
    <a href="restaurants.html" class="nav-item"><span><i class="fas fa-store"></i></span><span>Explore</span></a>
    <a href="menu.html" class="nav-item"><span><i class="fas fa-utensils"></i></span><span>Menu</span></a>
    <a href="cart.html" class="nav-item"><span><i class="fas fa-shopping-cart"></i></span><span>Cart</span></a>
    <a href="orders.html" class="nav-item active"><span><i class="fas fa-receipt"></i></span><span>Orders</span></a>
  </div>
</nav>
<div class="toast-container" id="toastContainer"></div>
<script src="../js/data.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/app.js"></script>
<script src="../js/particles.js"></script>
<script src="../js/animations.js"></script>
<script src="../js/orders.js"></script>
<script>if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('../sw.js').catch(()=>{});});}</script>
</body>
</html>
