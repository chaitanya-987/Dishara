<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — Kitchenova</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="cursor-glow" id="cursorGlow"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <div class="logo-icon"><i class="fas fa-cloud"></i><i class="fas fa-utensils logo-utensils"></i></div>
                <span class="logo-text">Cloud<span class="logo-highlight">Kitchen</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="../index.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
                <a href="restaurants.html" class="nav-link"><i class="fas fa-store"></i><span>Restaurants</span></a>
                <a href="menu.html" class="nav-link"><i class="fas fa-book-open"></i><span>Menu</span></a>
                <a href="cart.html" class="nav-link cart-link"><i class="fas fa-shopping-cart"></i><span>Cart</span><span class="cart-badge" id="cartBadge">0</span></a>
                <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                <a href="login.html" class="btn-nav-login" id="loginBtn"><i class="fas fa-user"></i><span>Login</span></a>
                <div class="user-menu hidden" id="userMenu">
                    <div class="user-avatar" id="userAvatar"><span>U</span></div>
                    <div class="user-dropdown" id="userDropdown">
                        <div class="dropdown-header"><span id="userName">User</span><small id="userRole">Customer</small></div>
                        <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                        <a href="orders.html"><i class="fas fa-receipt"></i> My Orders</a>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
                <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <div class="container">
            <h1 class="page-title animate-fade-up">My <span class="gradient-text">Orders</span></h1>
            <p class="page-subtitle animate-fade-up delay-1">Track all your orders here</p>
        </div>
    </section>

    <section class="orders-page">
        <div class="container">
            <div class="orders-list-page" id="ordersListPage">
                <!-- Injected by JS -->
            </div>
            <div class="empty-state hidden" id="emptyOrders">
                <div class="empty-icon">📦</div>
                <h3>No orders yet</h3>
                <p>Start ordering delicious food!</p>
                <a href="menu.html" class="btn btn-primary btn-glow"><i class="fas fa-utensils"></i> Browse Menu</a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 Kitchenova. All rights reserved. Made with ❤️</p></div></div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/particles.js"></script>
    <script src="../js/animations.js"></script>
    <script src="../js/orders.js"></script>
</body>
</html>
